<div class="auth-page">

  <a routerLink="/" class="auth-logo">GAMEHUB</a>

  <div class="auth-card">

    <h1>Create account</h1>

    <form (ngSubmit)="onRegister()" #form="ngForm">

      <input
        type="text"
        name="username"
        [(ngModel)]="username"
        placeholder="Username"
        required
      />

      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="Email"
        required
      />

      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        placeholder="Password"
        required
        minlength="8"
      />

      <input
        type="password"
        name="confirm"
        [(ngModel)]="confirmPassword"
        placeholder="Confirm password"
        required
      />

      @if (confirmPassword && password !== confirmPassword) {
        <p class="error">Passwords do not match</p>
      }

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }

      <button
        type="submit"
        [disabled]="form.invalid || password !== confirmPassword">
        Create Account
      </button>

    </form>

    <p>
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>

  </div>

</div>
