<app-header></app-header>

<div class="page-wrapper">

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="container hero-content">
      <div class="hero-text">
        <span class="hero-tag">New Release</span>
        <h1 class="hero-title">Your Next<br /><span>Adventure</span><br />Awaits</h1>
        <p class="hero-sub">Discover thousands of games. Buy once, play forever.</p>
        <div class="hero-actions">
          <a routerLink="/store" class="btn btn-primary">Browse Store</a>
          <a routerLink="/library" class="btn btn-outline">My Library</a>
        </div>
      </div>
      <div class="hero-visual">
        <div class="hero-card-glow"></div>
        <img src="assets/image/witcher.jpeg" alt="Featured game" class="hero-img" />

    </div>
  </section>

  <!-- Featured Games -->
  <section class="section container">

    <div class="games-grid">

    </div>

      <a routerLink="/store" class="btn btn-outline">See All Games</a>
    </div>
  </section>

  <!-- Genre Filter Bar -->
  <section class="genres-section container">
    <h2 class="section-title">Browse by <span>Genre</span></h2>
  </section>


</div>
