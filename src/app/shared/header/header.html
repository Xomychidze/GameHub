<header class="header">
  <div class="header-inner container">

    <a routerLink="/" class="logo">
      <span class="logo-icon">◈</span>
      GAME<span>HUB</span>
    </a>

    <nav class="nav">
      <a routerLink="/"       routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
      <a routerLink="/store"  routerLinkActive="active">Store</a>
      <a routerLink="/library" routerLinkActive="active">Library</a>
    </nav>

    <div class="header-actions">
      <a routerLink="/cart" class="icon-btn" title="Cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        @if (cartService.count > 0) {
          <span class="cart-badge">{{ cartService.count }}</span>
        }
      </a>

      @if (authService.isLoggedIn) {
        <a routerLink="/profile" class="user-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          {{ authService.currentUser?.username }}
        </a>
        <button class="btn btn-outline btn-sm" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/login" class="btn btn-primary btn-sm">Login</a>
      }
    </div>

  </div>
</header>
